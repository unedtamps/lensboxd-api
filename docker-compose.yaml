services:
  postgres:
    image: postgres:17-alpine
    container_name: boxd-postgres
    env_file:
      - .envrc
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - 5440:5432
    networks:
      - boxd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lensboxd -d lensboxd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: boxd-redis
    ports:
      - 6388:6379
    networks:
      - boxd-net

  api-boxd:
    container_name: boxd-api
    image: unedotamps/letterboxd-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .envrc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./model/model.pkl:/app/model/model.pkl
    ports:
      - 5000:5000
    networks:
      - boxd-net

networks:
  boxd-net:
    driver: bridge
